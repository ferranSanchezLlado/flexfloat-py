name: Release

on:
  push:
    branches: [main]

jobs:
  check-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_release: ${{ steps.release_pr.outputs.should_release }}
      pr_number: ${{ steps.release_pr.outputs.pr_number }}
      pr_title: ${{ steps.release_pr.outputs.pr_title }}
      pr_body: ${{ steps.release_pr.outputs.pr_body }}
      pr_author: ${{ steps.release_pr.outputs.pr_author }}
      labels: ${{ steps.release_pr.outputs.labels }}
    steps:
      - name: Find merged release PR
        id: release_pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: context.sha,
            });

            const pr = pulls.find((pull) => pull.merged_at && pull.base.ref === 'main');
            if (!pr) {
              core.notice(`No merged PR found for ${context.sha}; skipping release.`);
              core.setOutput('should_release', 'false');
              return;
            }

            const labels = pr.labels.map((label) => label.name);
            const shouldRelease = labels.includes('release');
            core.setOutput('should_release', shouldRelease ? 'true' : 'false');
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('pr_title', pr.title);
            core.setOutput('pr_body', pr.body || '');
            core.setOutput('pr_author', pr.user.login);
            core.setOutput('labels', labels.join(' '));

            if (!shouldRelease) {
              core.notice(`PR #${pr.number} does not have the release label; skipping release.`);
            }

  release:
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: read
      id-token: write # For trusted publishing to PyPI

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Get version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep -E '^version = ' pyproject.toml | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Run tests
        run: |
          pip install -e ".[dev]"
          pytest tests/

      - name: Build package
        run: |
          python -m build

      - name: Create Git tag
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"
          if git ls-remote --exit-code origin "refs/tags/${TAG}" > /dev/null 2>&1; then
            TAG_COMMIT=$(git ls-remote origin "refs/tags/${TAG}^{}" | cut -f1)
            if [ -z "$TAG_COMMIT" ]; then
              TAG_COMMIT=$(git ls-remote origin "refs/tags/${TAG}" | cut -f1)
            fi
            HEAD_COMMIT=$(git rev-parse HEAD)
            if [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
              echo "::error::Tag ${TAG} already exists at ${TAG_COMMIT}, expected ${HEAD_COMMIT}"
              exit 1
            fi
            echo "Tag ${TAG} already exists at HEAD, skipping creation"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Generate release notes
        id: release_notes
        env:
          RELEASE_VERSION: ${{ steps.get_version.outputs.version }}
          MERGE_COMMIT_MSG: ${{ needs.check-release.outputs.pr_title }}
          PR_BODY: ${{ needs.check-release.outputs.pr_body }}
          PR_NUMBER: ${{ needs.check-release.outputs.pr_number }}
          PR_AUTHOR: ${{ needs.check-release.outputs.pr_author }}
          LABELS: ${{ needs.check-release.outputs.labels }}
        run: |
          # Determine version bump type from labels
          BUMP_TYPE="patch"
          if echo "$LABELS" | grep -q "major"; then
            BUMP_TYPE="major"
          elif echo "$LABELS" | grep -q "minor"; then
            BUMP_TYPE="minor"
          elif echo "$LABELS" | grep -q "patch"; then
            BUMP_TYPE="patch"
          fi

          # Create release notes
          {
            printf '## Changes in v%s\n\n' "$RELEASE_VERSION"
            printf 'This release was automatically created from PR #%s by @%s.\n\n' "$PR_NUMBER" "$PR_AUTHOR"
            printf '**Version bump type**: %s\n\n' "$BUMP_TYPE"
            printf '### Pull Request Details\n'
            printf '**%s**\n\n' "$MERGE_COMMIT_MSG"
            printf '%s\n\n' "$PR_BODY"
            printf '### Artifacts\n'
            printf -- '- **Python Wheel**: `flexfloat-%s-py3-none-any.whl`\n' "$RELEASE_VERSION"
            printf -- '- **Source Distribution**: `flexfloat-%s.tar.gz`\n\n' "$RELEASE_VERSION"
            printf 'The package has been automatically published to [PyPI](https://pypi.org/project/flexfloat/%s/).\n' "$RELEASE_VERSION"
          } > release_notes.md

          echo "Release notes generated"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.get_version.outputs.version }}"
          name: "Release v${{ steps.get_version.outputs.version }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            ./dist/flexfloat-${{ steps.get_version.outputs.version }}-py3-none-any.whl
            ./dist/flexfloat-${{ steps.get_version.outputs.version }}.tar.gz

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          verbose: true

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ needs.check-release.outputs.pr_number }}'),
              body: `🚀 **Release Published Successfully!**
              
              **Version**: v${{ steps.get_version.outputs.version }}
              
              **Release**: [View on GitHub](https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/v${{ steps.get_version.outputs.version }})
              
              **PyPI**: [View on PyPI](https://pypi.org/project/flexfloat/${{ steps.get_version.outputs.version }}/)
              
              The package is now available for installation:
              \`\`\`bash
              pip install flexfloat==${{ steps.get_version.outputs.version }}
              \`\`\`
              `
            });
